name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: read

jobs:
  node:
    name: Node lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/node-app/package-lock.json
      - run: npm ci
        working-directory: services/node-app
      - run: npm run lint
        working-directory: services/node-app
      - run: npm test
        working-directory: services/node-app
      - name: Build Docker image
        run: docker build -t node-app ./services/node-app
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: node-app
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

  python:
    name: Python lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/python-app/requirements.txt
      - run: pip install -r requirements.txt ruff pytest
        working-directory: services/python-app
      - run: ruff check src/
        working-directory: services/python-app
      - run: ruff format --check src/
        working-directory: services/python-app
      - name: Build Docker image
        run: docker build -t python-app ./services/python-app
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: python-app
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
