name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  node:
    name: Node lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Debug env
        run: |
          echo "Node: $(node --version)"
          echo "NPM: $(npm --version)"
          echo "Lock exists: $(test -f services/node-app/package-lock.json && echo YES || echo NO)"
          head -3 services/node-app/package-lock.json

      - name: npm ci
        run: npm ci --loglevel verbose 2>&1
        working-directory: services/node-app

      - run: npm run lint
        working-directory: services/node-app

      - name: Test
        run: |
          if find src -name "*.test.js" | grep -q .; then
            npm test
          else
            echo "No test files yet — skipping"
          fi
        working-directory: services/node-app

      - name: Build Docker image
        run: docker build -t node-app ./services/node-app

      - name: Trivy scan — node-app
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: node-app
          format: table
          exit-code: 0
          ignore-unfixed: true
          severity: HIGH,CRITICAL

  python:
    name: Python lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/python-app/requirements.txt

      - run: pip install -r requirements.txt ruff pytest
        working-directory: services/python-app

      - run: ruff check src/
        working-directory: services/python-app

      - run: ruff format --check src/
        working-directory: services/python-app

      - name: Build Docker image
        run: docker build -t python-app ./services/python-app

      - name: Trivy scan — python-app
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: python-app
          format: table
          exit-code: 0
          ignore-unfixed: true
          severity: HIGH,CRITICAL

  web:
    name: Web build smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/web/package-lock.json

      - run: npm ci
        working-directory: packages/web

      - run: npm run build
        working-directory: packages/web

      - name: Smoke test — HTML + bundle present
        run: |
          grep -q 'EZ Launch' packages/web/dist/index.html
          grep -q 'assets/' packages/web/dist/index.html

  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
